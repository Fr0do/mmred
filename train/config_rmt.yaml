# Recipe for training an RMT model with LoRA and curriculum learning

# Dataset
dataset_name: "dataset/hf_main_1mv_train_full"
split: "train"
val_split: "val"
subset: "default"
system_prompt: "You are a helpful AI Assistant."
task_prompt: |
  Format your final answer with a {"answer": <value>}, where <value> is:
    - A **single room name** (e.g., 'Kitchen') for location answers.
    - A **number** (e.g., '3') for counting answers.
    - A **single person name** (e.g., 'Michael') for people answers or 'Nobody' if no person satisfies given conditions.

# Base Model
model_name_or_path: "Qwen/Qwen3-4B-Instruct-2507"
dtype: bfloat16
attn_implementation: flash_attention_2

# Peft Model
use_peft: true
lora_r: 32
lora_target_modules: "all-linear"
# - "q_proj"
# - "k_proj"
# - "v_proj"
# - "o_proj"
lora_modules_to_save: 
  - "memory_cell"
  # - "lm_head"
  # - "embed_tokens"
lora_alpha: 32
lora_dropout: 0.05

# RMT args
segment_size: 256
num_mem_tokens: 32
max_n_segments: 16
k2: -1

# Curriculum args
curriculum_stages:
  # - max_n_segments: 2
  #   num_train_epochs: 1
  # - max_n_segments: 3
  #   num_train_epochs: 1
  # - max_n_segments: 4
  #   num_train_epochs: 1
  - max_n_segments: 6
    num_train_epochs: 5
early_stopping_patience: 2
early_stopping_threshold: 0.005

# Training Args
use_liger_kernel: true
output_dir: "checkpoints/rmt_qwen_4b_lora_frozen_mem"
run_name: "rmt_qwen_4b_lora_frozen_mem"
overwrite_output_dir: true
per_device_train_batch_size: 32
max_grad_norm: 1.0
gradient_accumulation_steps: 1
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: False
dataloader_num_workers: 16
learning_rate: 5.e-5
weight_decay: 0.01
warmup_ratio: 0.05
lr_scheduler_type: "constant_with_warmup"
optim: "schedule_free_adamw" # "adamw_torch"
log_level: info
logging_first_step: true
logging_steps: 1
bf16: true
bf16_full_eval: true
num_train_epochs: 5 # This will be overridden by curriculum
# max_steps: 5
# do_eval: false
per_device_eval_batch_size: 16
report_to:
  - "clearml"
seed: 42
eval_strategy: epoch
# eval_steps: 100
save_strategy: epoch
save_total_limit: 5
group_by_length: true
load_best_model_at_end: false