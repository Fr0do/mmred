# MMReD Base Task Configuration
# Inheritable configuration for all MMReD Dense Context tasks

output_type: generate_until
dataset_path: dondosss/mmred_mera
test_split: test
fewshot_delimiter: "\n\n"

# Prompt formatting
doc_to_text: "{{instruction.format(**inputs).strip()}}"
doc_to_target: "outputs"
target_delimiter: "\nAnswer: "

# Multimodal: image loading (uncomment for VLM evaluation)
# doc_to_image: !function utils.doc_to_image

# Generation settings
generation_kwargs:
  do_sample: false
  max_gen_toks: 32768
  until:
    - "\nQuestion:"

# Answer extraction filters
filter_list:
  - name: "scoring"
    filter:
      - function: !function utils.extract_answer_filter
      - function: "take_first"

# Metrics
process_results: !function utils.process_results
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true

should_decontaminate: false
num_fewshot: 0
