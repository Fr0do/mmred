task: mmred_sparse
output_type: generate_until
dataset_path: json
test_split: train
doc_to_text: "{{prompt}}"
doc_to_target: "gold"
generation_kwargs:
  do_sample: false
  max_gen_toks: 8192
  until:
    - "\n\nQuestion:"
    - "\nQuestion:"
filter_list:
  - name: scoring
    filter:
      - function: !function utils.extract_answer_filter
      - function: take_first
process_results: !function utils.process_results
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
should_decontaminate: false
num_fewshot: 0
